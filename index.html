<style>
:root{

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}

.wm .az{font-size:.55em;color:var(--amber)}
@media (prefers-reduced-motion:no-preference){
  .wm .ii svg{animation:flick 2.8s ease-in-out infinite;transform-origin:50% 100%}
  @keyframes flick{0%,100%{transform:translateX(-50%) scaleY(1)}50%{transform:translateX(-50%) scaleY(1.09)}}
}

.line{
  margin-top:26px;font-family:var(--mono);font-size:13px;
  letter-spacing:.28em;color:var(--amber);text-transform:uppercase;
